<!DOCTYPE html>
<html lang="fr">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Calculatrice standard</title>
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<main class="calculator-shell">
		<section class="calculator" aria-label="Calculatrice standard">
			<header class="calculator__header">
				<p class="calculator__eyebrow">Standard</p>
				<h1>Calculatrice</h1>
			</header>

			<div class="calculator__display" role="status" aria-live="polite">
				<div class="calculator__expression" id="expression">0</div>
				<div class="calculator__result" id="result">0</div>
			</div>

			<div class="calculator__keys" aria-label="Touches de calculatrice">
				<button class="key key--utility" data-action="clear">AC</button>
				<button class="key key--utility" data-action="delete">DEL</button>
				<button class="key key--utility" data-action="percent">%</button>
				<button class="key key--operator" data-value="/">÷</button>

				<button class="key" data-value="7">7</button>
				<button class="key" data-value="8">8</button>
				<button class="key" data-value="9">9</button>
				<button class="key key--operator" data-value="*">×</button>

				<button class="key" data-value="4">4</button>
				<button class="key" data-value="5">5</button>
				<button class="key" data-value="6">6</button>
				<button class="key key--operator" data-value="-">−</button>

				<button class="key" data-value="1">1</button>
				<button class="key" data-value="2">2</button>
				<button class="key" data-value="3">3</button>
				<button class="key key--operator" data-value="+">+</button>

				<button class="key key--wide" data-value="0">0</button>
				<button class="key" data-action="decimal">.</button>
				<button class="key key--equals" data-action="equals">=</button>
			</div>
		</section>
	</main>

	<script src="script.js"></script>
</body>
</html>
